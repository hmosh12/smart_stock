name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Auto-Fix and Build
        run: |
          flutter create --project-name smart_stock build_dir
          cp main.dart build_dir/lib/main.dart
          cp pubspec.yaml build_dir/pubspec.yaml
          cd build_dir
          flutter pub get
          # هذا الأمر سيفحص كودك ويخبرنا بمكان الخطأ بالضبط
          flutter analyze || true 
          flutter build apk --debug --no-tree-shake-icons
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SmartStock-App
          path: build_dir/build/app/outputs/flutter-apk/app-debug.apk
