name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Create and Fix Project
        run: |
          # 1. إنشاء المشروع
          flutter create --project-name smart_stock build_dir
          
          # 2. نقل ملفاتك
          cp main.dart build_dir/lib/main.dart
          cp pubspec.yaml build_dir/pubspec.yaml
          
          # 3. تعديل نسخة الأندرويد (هام جداً لمكتبة sqflite)
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' build_dir/android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' build_dir/android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' build_dir/android/app/build.gradle

      - name: Final Build
        working-directory: build_dir
        run: |
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons

      - name: Download Link
        uses: actions/upload-artifact@v4
        with:
          name: SmartStock-Final
          path: build_dir/build/app/outputs/flutter-apk/app-debug.apk
