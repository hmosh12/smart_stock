name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Project and Injects Code
        run: |
          # إنشاء مشروع فلاتر كامل ونظيف داخل السيرفر
          flutter create --project-name smart_stock build_dir
          
          # استبدال الكود الافتراضي بكودك (main.dart)
          cp main.dart build_dir/lib/main.dart
          
          # استبدال الإعدادات بملفك (pubspec.yaml)
          cp pubspec.yaml build_dir/pubspec.yaml

      - name: Build Final APK
        working-directory: build_dir
        run: |
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartStock-App
          path: build_dir/build/app/outputs/flutter-apk/app-debug.apk
