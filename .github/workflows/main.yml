name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: |
          flutter create --project-name smart_stock my_app
          cp main.dart my_app/lib/main.dart
          cd my_app
          flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: My-Smart-App
          path: my_app/build/app/outputs/flutter-apk/app-debug.apk
