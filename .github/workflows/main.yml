name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Setup Project and Dependencies
        run: |
          # إنشاء مشروع جديد
          flutter create --project-name smart_stock build_dir
          
          # استبدال الملفات
          cp main.dart build_dir/lib/main.dart
          cp pubspec.yaml build_dir/pubspec.yaml
          
          # الدخول للمجلد وتنفيذ الأوامر
          cd build_dir
          flutter pub get
          
          # خطوة هامة لمكتبة sqflite لتجنب أخطاء Gradle
          cd android
          echo "org.gradle.jvmargs=-Xmx1536M" >> gradle.properties

      - name: Build APK
        working-directory: build_dir
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SmartStock-App
          path: build_dir/build/app/outputs/flutter-apk/app-debug.apk
